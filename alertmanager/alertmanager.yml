route:
  receiver: lab-console
  group_by:
    - alertname
    - severity
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 2m

receivers:
  - name: lab-console

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
